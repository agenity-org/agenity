{{- if .Values.coturn.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  labels: { app: coturn }
spec:
  replicas: 1
  selector: { matchLabels: { app: coturn } }
  template:
    metadata: { labels: { app: coturn } }
    spec:
      containers:
        - name: coturn
          image: {{ .Values.coturn.image.repository }}:{{ .Values.coturn.image.tag }}
          args:
            - -n
            - --no-cli
            - --realm={{ .Values.coturn.realm }}
            - --listening-port={{ .Values.coturn.stunPort }}
            - --tls-listening-port={{ .Values.coturn.turnTLSPort }}
            - --use-auth-secret
            - --static-auth-secret=$(COTURN_SHARED_SECRET)
            - --max-bps={{ .Values.coturn.maxBpsPerSession }}
            - --no-loopback-peers
            - --no-multicast-peers
          env:
            - name: COTURN_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.coturn.authSecretRef.name }}
                  key: {{ .Values.coturn.authSecretRef.key }}
          ports:
            - { name: stun-udp,   containerPort: {{ .Values.coturn.stunPort }},   protocol: UDP }
            - { name: stun-tcp,   containerPort: {{ .Values.coturn.stunPort }},   protocol: TCP }
            - { name: turn-tls,   containerPort: {{ .Values.coturn.turnTLSPort }}, protocol: TCP }
          resources: {{- toYaml .Values.coturn.resources | nindent 12 }}
{{- end }}
