name: ci

on:
  push:
    branches: [main, v0.9.2-build]
  pull_request:
    branches: [main, v0.9.2-build]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - name: Banned-vocab sweep guard (#212)
        # Architect-spec'd guard from #212. Tokens live in
        # scripts/.banned-vocab-tokens-212; the runner script reads them
        # without naming them in this workflow file (so the workflow
        # itself doesn't trip the very check it enforces).
        run: bash scripts/banned-vocab-212.sh
      - name: Stage 4 model-ID regression guard (#244)
        # Pins the canonical Anthropic API model IDs in
        # Stage4AgentTypes.svelte. Drift surfaces here rather than at
        # operator-clicks-Launch time. See scripts/check-stage4-model-ids.sh
        # + issue #244 for context.
        run: bash scripts/check-stage4-model-ids.sh
      - name: Agent entrypoint refresh-on-spawn guard (#254)
        # Asserts agent-entrypoint.sh ALWAYS overwrites
        # ~/.claude/.credentials.json + ~/.claude.json from /run/secrets/.
        # The prior `[ ! -e ]` skip-if-exists guard pinned a first-spawn
        # snapshot across subsequent spawns; the per-agent HOME volume
        # persists across spawns so the existing-file check fires every
        # time and the freshly-refreshed token never reaches the agent.
        # See scripts/test-agent-entrypoint.sh + issue #254.
        run: bash scripts/test-agent-entrypoint.sh
      - name: Grid-class collision guard (#228)
        # No Svelte component may use class="grid" — that's the
        # unscoped marketing-page utility from global.css:25 and
        # caused the #226 thead/tbody-as-grid-columns bug when
        # applied to a <table>. See scripts/check-grid-class-collision.sh
        # + issue #228 for the rename pattern.
        run: bash scripts/check-grid-class-collision.sh
      - run: go test ./... -race -count=1
