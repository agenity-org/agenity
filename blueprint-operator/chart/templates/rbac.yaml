apiVersion: v1
kind: ServiceAccount
metadata:
  name: chepherd-operator
  namespace: {{ .Release.Namespace }}
---
{{- if eq .Values.rbac.scope "cluster" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chepherd-operator
rules:
  # Reconcile our own CRD
  - apiGroups: ["chepherd.io"]
    resources: ["chepherdagents"]
    verbs:     ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["chepherd.io"]
    resources: ["chepherdagents/status", "chepherdagents/finalizers"]
    verbs:     ["get", "update", "patch"]
  # Create the agent Pods this operator manages — image is constrained
  # by Kyverno (see kyverno.yaml).
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs:     ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs:     ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chepherd-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chepherd-operator
subjects:
  - kind: ServiceAccount
    name: chepherd-operator
    namespace: {{ .Release.Namespace }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chepherd-operator
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: ["chepherd.io"]
    resources: ["chepherdagents"]
    verbs:     ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["chepherd.io"]
    resources: ["chepherdagents/status", "chepherdagents/finalizers"]
    verbs:     ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs:     ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs:     ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chepherd-operator
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chepherd-operator
subjects:
  - kind: ServiceAccount
    name: chepherd-operator
    namespace: {{ .Release.Namespace }}
{{- end }}
