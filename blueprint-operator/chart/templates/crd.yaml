apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: chepherdagents.chepherd.io
  annotations:
    chepherd.io/version: {{ .Chart.AppVersion | quote }}
spec:
  group: chepherd.io
  scope: Namespaced
  names:
    kind: ChepherdAgent
    listKind: ChepherdAgentList
    plural: chepherdagents
    singular: chepherdagent
    shortNames:
      - chag
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [name, image, role]
              properties:
                name:
                  type: string
                  description: "Canonical session name (chepherd's @-address)."
                image:
                  type: string
                  description: "Container image; must match the operator's image-allowlist."
                role:
                  type: string
                  enum: [worker, shepherd, orchestrator]
                team:
                  type: string
                  default: default
                mcpUrl:
                  type: string
                  description: "WebSocket URL for the chepherd MCP server."
                cwd:
                  type: string
                  description: "Working directory inside the agent container."
                secretRef:
                  type: object
                  description: "K8s Secret containing /run/secrets/* material (Claude OAuth + VCS tokens)."
                  properties:
                    name: { type: string }
                env:
                  type: array
                  items:
                    type: object
                    properties:
                      name:  { type: string }
                      value: { type: string }
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Spawning, Running, Failed, Terminated]
                podName: { type: string }
                exitCode:
                  type: integer
                  format: int32
                lastTransitionTime:
                  type: string
                  format: date-time
                message: { type: string }
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Role
          type: string
          jsonPath: .spec.role
        - name: Pod
          type: string
          jsonPath: .status.podName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
