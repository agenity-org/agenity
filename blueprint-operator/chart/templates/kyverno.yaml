{{- if .Values.kyverno.enabled }}
# Kyverno admission policy that constrains what the chepherd-operator can
# create. Even if the operator's ServiceAccount is somehow compromised,
# only chepherd-agent:* images can run; no hostPath, no privileged, no
# hostNetwork, no SA-token automount — closing the Falco-flagged
# privilege-escalation gap that direct pods/create would expose.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: chepherd-agent-pod-constraints
  annotations:
    policies.kyverno.io/title: chepherd-agent pod constraints
    policies.kyverno.io/description: |
      Hard ceiling on what the chepherd-operator can create. Image must
      start with {{ .Values.kyverno.allowedImagePrefix }} and the Pod
      must not be privileged or use hostPath / hostNetwork.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: only-chepherd-agent-images
      match:
        any:
          - resources:
              kinds: [Pod]
              # Scope to Pods created by the chepherd-operator SA only —
              # other workloads in the cluster are unaffected.
              subjects:
                - kind: ServiceAccount
                  name: chepherd-operator
      validate:
        message: "chepherd-operator can only spawn pods whose image starts with {{ .Values.kyverno.allowedImagePrefix }}"
        pattern:
          spec:
            containers:
              - image: "{{ .Values.kyverno.allowedImagePrefix }}*"
    - name: no-privileged-no-hostpath
      match:
        any:
          - resources:
              kinds: [Pod]
              subjects:
                - kind: ServiceAccount
                  name: chepherd-operator
      validate:
        message: "chepherd-agent pods must not be privileged, host-networked, or mount hostPath volumes"
        pattern:
          spec:
            =(hostNetwork): false
            =(hostPID):     false
            =(hostIPC):     false
            containers:
              - =(securityContext):
                  =(privileged):              false
                  =(allowPrivilegeEscalation): false
            =(volumes):
              - X(hostPath): "*"
    - name: no-automounted-sa-tokens
      match:
        any:
          - resources:
              kinds: [Pod]
              subjects:
                - kind: ServiceAccount
                  name: chepherd-operator
      validate:
        message: "chepherd-agent pods must set automountServiceAccountToken: false (#127 security contract)"
        pattern:
          spec:
            automountServiceAccountToken: false
{{- end }}
