apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "chepherd.fullname" . }}
  labels:
    {{- include "chepherd.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "chepherd.fullname" . }}-headless
  replicas: 1
  selector:
    matchLabels:
      {{- include "chepherd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chepherd.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "chepherd.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: chepherd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - run
            - --listen=0.0.0.0:{{ .Values.chepherd.listenPort }}
            - --mcp-listen=0.0.0.0:{{ .Values.chepherd.mcpListenPort }}
            - --headless
            {{- if not .Values.chepherd.scrumMaster.enabled }}
            - --no-shepherd
            {{- end }}
            {{- if .Values.chepherd.scrumMaster.enabled }}
            - --scrummaster-name={{ .Values.chepherd.scrumMaster.name }}
            {{- end }}
            {{- if .Values.chepherd.federation.registryURL }}
            - --federation-registry-url={{ .Values.chepherd.federation.registryURL }}
            {{- end }}
            {{- if .Values.chepherd.federation.publicURL }}
            - --federation-public-url={{ .Values.chepherd.federation.publicURL }}
            {{- end }}
          env:
            - name: CHEPHERD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CHEPHERD_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: {{ .Values.chepherd.listenPort }}
              protocol: TCP
            - name: mcp
              containerPort: {{ .Values.chepherd.mcpListenPort }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: state
              mountPath: /home/chepherd/.local/state/chepherd-v05
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: state
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
