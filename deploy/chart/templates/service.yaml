apiVersion: v1
kind: Service
metadata:
  name: {{ include "chepherd.fullname" . }}
  labels:
    {{- include "chepherd.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.webPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.mcpPort }}
      targetPort: mcp
      protocol: TCP
      name: mcp
  selector:
    {{- include "chepherd.selectorLabels" . | nindent 4 }}
---
# Headless service for the StatefulSet's stable DNS name.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chepherd.fullname" . }}-headless
  labels:
    {{- include "chepherd.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.webPort }}
      targetPort: http
      name: http
  selector:
    {{- include "chepherd.selectorLabels" . | nindent 4 }}
