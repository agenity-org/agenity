# Default values for chepherd. Override via `helm install -f my-values.yaml`.
#
# This chart deploys the chepherd control plane as a single replica
# StatefulSet (single SQLite-backed instance; HA backed by postgres is
# a future v0.9.4 chart variant). Agent spawning uses chepherd's
# PodRunner against the cluster's own k8s API, so the chart's
# ServiceAccount gets per-namespace Pod create/exec/delete RBAC.
#
# Refs #225 row D2 #225 row D7 (SeaweedFS) #225 row D5 (Observability).

image:
  # Operators with a private registry: override repository + pullPolicy.
  repository: ghcr.io/chepherd/chepherd
  tag: ""            # default: appVersion from Chart.yaml
  pullPolicy: IfNotPresent
  pullSecrets: []    # imagePullSecrets list ([{name: my-secret}])

# chepherd run flags. See `chepherd run --help` for the full surface.
chepherd:
  # listen address inside the container (Service maps :80 → this port)
  listenPort: 8080
  # MCP HTTP/WS listen address inside the container
  mcpListenPort: 9090
  # auto-spawn a Scrum Master session on boot
  scrumMaster:
    enabled: true
    # back-compat default for operators using legacy @shepherd relay
    name: shepherd
  # federation (#225 rows C1-C3) — empty disables
  federation:
    registryURL: ""
    publicURL: ""

# Persistence — SQLite file lives here; agent state dirs hang off it.
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""   # empty = cluster default
  accessModes:
    - ReadWriteOnce

# Service exposure. ClusterIP suits in-cluster federation peers;
# LoadBalancer or Ingress for operator dashboard access.
service:
  type: ClusterIP
  webPort: 80        # external port mapped to chepherd.listenPort
  mcpPort: 9090
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chepherd.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ServiceAccount + RBAC scoped to the chart's namespace so chepherd's
# PodRunner can spawn agent pods. Disable when running ProcessRunner
# (rootless podman sibling) — that mode doesn't need cluster RBAC.
serviceAccount:
  create: true
  name: ""
rbac:
  # Pod create/exec/delete inside the chart namespace for agent spawning.
  agentSpawn: true

# Resource requests/limits — chepherd itself is small; agent pods get
# their own resource sizing per their CRD spec.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1
    memory: 1Gi

# Probes — /healthz endpoint shape pinned by chepherd's HTTP server.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

# Node/pod placement
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podSecurityContext:
  fsGroup: 1000
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# SeaweedFS storage backend (#225 row D7).
seaweedfs:
  enabled: false
  image:
    repository: chrislusf/seaweedfs
    tag: "3.79"
    pullPolicy: IfNotPresent
  master:
    replicas: 1
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
  volume:
    replicas: 1
    persistence:
      enabled: true
      size: 50Gi
      storageClass: ""
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 4Gi
    tier:
      enabled: false
      maxAgeDays: 30
      s3:
        endpoint: ""
        bucket: ""
        credentialsSecret: ""
  filer:
    replicas: 1
    s3Port: 8333
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ""

# chepherd storage backend selection. Defaults to local PVC.
# When seaweedfs.enabled OR external S3 is configured, chepherd
# uses S3 for artifacts + vault blobs + session jsonls.
storage:
  backend: pvc
  s3:
    endpoint: ""
    region: us-east-1
    bucket: chepherd-blobs
    credentialsSecret: ""
    pathStyle: true

# Observability stack (#225 row D5).
# When enabled, deploys Alloy DaemonSet (logs/metrics/traces
# collector) + Loki/Mimir/Tempo single-binary StatefulSets per
# V0.9.2-ARCH §7. OTel push from chepherd-mcp goes to Alloy on
# 4317 (gRPC) / 4318 (HTTP).
observability:
  enabled: false
  alloy:
    image: "grafana/alloy:v1.4.2"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
  loki:
    image: "grafana/loki:3.2.1"
    storage: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
  mimir:
    image: "grafana/mimir:2.14.2"
    storage: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
  tempo:
    image: "grafana/tempo:2.6.1"
    storage: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi

# mTLS server config (#225 row B4 deployment-side).
# Top-level tls: block (not under chepherd: — that key is already
# defined above).
# When enabled, chepherd serves HTTPS with the cert/key from
# .chepherd.tls.serverSecret. When clientCASecret is also set,
# chepherd requires + verifies a client cert against that CA
# (mTLS); the cert subject is extracted into the
# 'Authorization: mTLS <subject>' header for B4 MTLSValidator
# to match against AcceptedSubjects.
#
# Typical wiring: cert-manager provisions both secrets via
# Certificate CRDs; this chart just mounts them. Operators with
# an external mTLS terminator (Cilium / Envoy / Istio) keep
# enabled: false + let the proxy strip mTLS before forwarding
# to chepherd over plaintext within the mesh.
tls:
  enabled: false
  # K8s Secret with keys: tls.crt, tls.key (cert-manager Certificate
  # writes this shape by default).
  serverSecret: ""
  # Optional K8s Secret with key: ca.crt — when set, chepherd
  # ClientAuth=RequireAndVerifyClientCert against this CA bundle.
  # Leave empty for server-side-only TLS.
  clientCASecret: ""
