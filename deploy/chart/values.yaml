# Default values for chepherd. Override via `helm install -f my-values.yaml`.
#
# This chart deploys the chepherd control plane as a single replica
# StatefulSet (single SQLite-backed instance; HA backed by postgres is
# a future v0.9.4 chart variant). Agent spawning uses chepherd's
# PodRunner against the cluster's own k8s API, so the chart's
# ServiceAccount gets per-namespace Pod create/exec/delete RBAC.
#
# Refs #225 row D2 #225 row D7 (SeaweedFS).

image:
  # Operators with a private registry: override repository + pullPolicy.
  repository: ghcr.io/chepherd/chepherd
  tag: ""            # default: appVersion from Chart.yaml
  pullPolicy: IfNotPresent
  pullSecrets: []    # imagePullSecrets list ([{name: my-secret}])

# chepherd run flags. See `chepherd run --help` for the full surface.
chepherd:
  # listen address inside the container (Service maps :80 → this port)
  listenPort: 8080
  # MCP HTTP/WS listen address inside the container
  mcpListenPort: 9090
  # auto-spawn a Scrum Master session on boot
  scrumMaster:
    enabled: true
    # back-compat default for operators using legacy @shepherd relay
    name: shepherd
  # federation (#225 rows C1-C3) — empty disables
  federation:
    registryURL: ""
    publicURL: ""

# Persistence — SQLite file lives here; agent state dirs hang off it.
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""   # empty = cluster default
  accessModes:
    - ReadWriteOnce

# Service exposure. ClusterIP suits in-cluster federation peers;
# LoadBalancer or Ingress for operator dashboard access.
service:
  type: ClusterIP
  webPort: 80        # external port mapped to chepherd.listenPort
  mcpPort: 9090
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chepherd.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ServiceAccount + RBAC scoped to the chart's namespace so chepherd's
# PodRunner can spawn agent pods. Disable when running ProcessRunner
# (rootless podman sibling) — that mode doesn't need cluster RBAC.
serviceAccount:
  create: true
  name: ""
rbac:
  # Pod create/exec/delete inside the chart namespace for agent spawning.
  agentSpawn: true

# Resource requests/limits — chepherd itself is small; agent pods get
# their own resource sizing per their CRD spec.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1
    memory: 1Gi

# Probes — /healthz endpoint shape pinned by chepherd's HTTP server.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

# Node/pod placement
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podSecurityContext:
  fsGroup: 1000
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# SeaweedFS storage backend (#225 row D7).
# When enabled, the chart deploys a co-located SeaweedFS cluster
# (1 master, 1 volume server, 1 filer) and points chepherd at it
# via S3 API. Provides hot/warm/cold tiering for artifacts +
# vault blobs + claude session jsonls per V0.9.2-ARCHITECTURE §7.
#
# Operators with an existing S3-compatible store (AWS S3, MinIO,
# Wasabi) keep enabled: false + set storage.s3.* fields instead so
# chepherd talks to their bucket directly.
seaweedfs:
  enabled: false
  image:
    repository: chrislusf/seaweedfs
    tag: "3.79"
    pullPolicy: IfNotPresent
  master:
    replicas: 1
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
  volume:
    replicas: 1
    persistence:
      enabled: true
      size: 50Gi
      storageClass: ""
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 4Gi
    # Tier-cold: when set, volumes older than maxAgeDays are moved
    # to the configured S3 backend (typically cheaper object storage).
    tier:
      enabled: false
      maxAgeDays: 30
      s3:
        endpoint: ""
        bucket: ""
        credentialsSecret: ""
  filer:
    replicas: 1
    s3Port: 8333
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ""

# chepherd storage backend selection. Defaults to local PVC.
# When seaweedfs.enabled OR external S3 is configured, chepherd
# uses S3 for artifacts + vault blobs + session jsonls (large/
# append-mostly data); chepherd.db (SQLite metadata) stays on
# PVC so transactional reads remain fast.
storage:
  # 'pvc' = local PVC (current default); 's3' = SeaweedFS or external S3.
  backend: pvc
  s3:
    endpoint: ""           # e.g. http://<release>-seaweedfs-filer:8333
    region: us-east-1
    bucket: chepherd-blobs
    # K8s Secret with keys: accessKey, secretKey. When seaweedfs.enabled,
    # leave empty — chart provisions a Secret named "<release>-seaweedfs-s3".
    credentialsSecret: ""
    pathStyle: true        # true for SeaweedFS + MinIO; false for AWS S3
