  - generic [ref=e22]:
    - heading "what it does" [level=2] [ref=e23]
    - paragraph [ref=e24]: ─────────────
    - list [ref=e25]:
      - listitem [ref=e26]: ● watches every Claude Code session in tmux across all your repos — no setup per-session
      - listitem [ref=e27]: ● reads each session's JSONL transcript + git log + GitHub issue state every tick
      - listitem [ref=e28]: ● scores G / V / F / E (goal · velocity · focus · end-state-proximity) on every tick
      - listitem [ref=e29]: ● coaches via tmux paste-buffer when divergence is real — cites principles by number from your CLAUDE.md
      - listitem [ref=e30]: ● adaptive cadence (2 / 5 / 10 / 30 min) — concentrates attention on struggling sessions, leaves trusted sessions alone
      - listitem [ref=e31]: ● escalates to Opus when in crisis band, stays on Sonnet otherwise
      - listitem [ref=e32]: ● anti-theater detection — catches "ship busy commits to deflect from the named blocker" patterns
      - listitem [ref=e33]: ● never closes issues (only the operator does, after walk-screenshot)
