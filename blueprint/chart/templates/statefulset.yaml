apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "chepherd.fullname" . }}
  labels:
    {{- include "chepherd.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "chepherd.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "chepherd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chepherd.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        # chepherd runtime — pty-host + MCP server + @target relay + web UI
        - name: chepherd
          image: {{ include "chepherd.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - run
            - --headless    # Pod mode: no TUI, just runtime + WS endpoint
            {{- if not .Values.runtime.monitored }}
            - --unmonitored
            {{- end }}
            - --agent
            - {{ .Values.runtime.defaultAgent | quote }}
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          env:
            - name: SANDBOX_RING_BUFFER_BYTES
              value: {{ .Values.runtime.ringBufferBytes | quote }}
            {{- if .Values.runtime.agentsCatalogPath }}
            - name: CHEPHERD_AGENTS_PATH
              value: {{ .Values.runtime.agentsCatalogPath | quote }}
            {{- end }}
            # v0.8 deployment profile + per-knob overrides (#129)
            {{- if .Values.profile.name }}
            - name: CHEPHERD_PROFILE
              value: {{ .Values.profile.name | quote }}
            {{- end }}
            {{- if .Values.profile.spawner }}
            - name: CHEPHERD_SPAWNER
              value: {{ .Values.profile.spawner | quote }}
            {{- end }}
            {{- if .Values.profile.auth.mode }}
            - name: CHEPHERD_AUTH_MODE
              value: {{ .Values.profile.auth.mode | quote }}
            {{- end }}
            {{- if .Values.profile.auth.oidcIssuer }}
            - name: CHEPHERD_OIDC_ISSUER
              value: {{ .Values.profile.auth.oidcIssuer | quote }}
            {{- end }}
            {{- if .Values.profile.storage }}
            - name: CHEPHERD_STORAGE
              value: {{ .Values.profile.storage | quote }}
            {{- end }}
            {{- if .Values.profile.tls }}
            - name: CHEPHERD_TLS
              value: {{ .Values.profile.tls | quote }}
            {{- end }}
            # MCP transport URL — agents inside the cluster dial the
            # chepherd Service DNS directly; no host.containers.internal
            # phantom-gateway needed (#124).
            - name: CHEPHERD_MCP_URL
              value: "ws://{{ include "chepherd.fullname" . }}.{{ .Release.Namespace }}.svc:9090/mcp/ws"
            {{- if .Values.openovaMCP.enabled }}
            - name: SANDBOX_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openovaMCP.jwtSecretRef.name }}
                  key: SIGNING_KEY
            - name: SANDBOX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openovaMCP.jwtSecretRef.name }}
                  key: LLM_GATEWAY_TOKEN
            {{- end }}
            {{- if .Values.auth.enabled }}
            - name: CHEPHERD_AUTH_COOKIE_NAME
              value: {{ .Values.auth.cookieName | quote }}
            - name: CHEPHERD_AUTH_WHOAMI_URL
              value: {{ .Values.auth.whoamiEndpoint | quote }}
            {{- end }}
          volumeMounts:
            - name: repo
              mountPath: /repo
            - name: claude-memory
              mountPath: /.claude-memory
            - name: cache
              mountPath: /.cache
            - name: state
              mountPath: /var/chepherd
            {{- if .Values.openovaMCP.enabled }}
            - name: mcp-config
              mountPath: /etc/chepherd/mcp
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: state
          emptyDir: {}
        {{- if .Values.openovaMCP.enabled }}
        - name: mcp-config
          configMap:
            name: {{ include "chepherd.fullname" . }}-mcp
        {{- end }}
  # Per-session PVCs — preserves openova Sandbox shape so the multi-device
  # handoff guarantee (Scene 6) survives Pod restarts.
  volumeClaimTemplates:
    - metadata:
        name: repo
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.persistence.repo.size }}
        {{- if .Values.persistence.repo.storageClass }}
        storageClassName: {{ .Values.persistence.repo.storageClass }}
        {{- end }}
    - metadata:
        name: claude-memory
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.persistence.claudeMemory.size }}
        {{- if .Values.persistence.claudeMemory.storageClass }}
        storageClassName: {{ .Values.persistence.claudeMemory.storageClass }}
        {{- end }}
    - metadata:
        name: cache
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.persistence.cache.size }}
        {{- if .Values.persistence.cache.storageClass }}
        storageClassName: {{ .Values.persistence.cache.storageClass }}
        {{- end }}
