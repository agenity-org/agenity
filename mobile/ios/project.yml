# XcodeGen spec — generates chepherd-rc.xcodeproj from this Swift Package.
# A Mac dev with `brew install xcodegen` runs:
#
#     xcodegen
#     open chepherd-rc.xcodeproj
#
# and gets a buildable iOS app target depending on the SPM libraries.
# CI uses the same path: xcodegen + xcodebuild for archive + IPA.

name: chepherd-rc

options:
  bundleIdPrefix: io.chepherd
  deploymentTarget:
    iOS: '17.0'
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: 6.0
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    CLANG_CXX_LANGUAGE_STANDARD: 'gnu++20'
    DEAD_CODE_STRIPPING: YES
    SWIFT_EMIT_LOC_STRINGS: YES

packages:
  ChepherdRC:
    path: '.'

targets:

  chepherd-rc:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: App/Assets.xcassets
        buildPhase: resources
      # Sources/ChepherdApp is consumed via the ChepherdApp SPM library
      # dep (packages.ChepherdRC). Adding it as a source path here
      # too produces a duplicate '_main' at link time.
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: chepherd
        CFBundleShortVersionString: 0.2.0
        CFBundleVersion: '1'
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ''
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # OAuth2 callback — Auth.swift redirects to io.chepherd.rc://callback
        CFBundleURLTypes:
          - CFBundleURLName: io.chepherd.rc
            CFBundleURLSchemes:
              - io.chepherd.rc
        # Cleartext HTTP forbidden (we only talk to id.openova.io + relay.chepherd.org over TLS).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        # Keychain access group for TokenStore actor.
        KeychainAccessGroups:
          - $(AppIdentifierPrefix)io.chepherd.rc
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.chepherd.rc
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: '1,2'
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: ''
    dependencies:
      - package: ChepherdRC
        product: ChepherdApp
      - package: ChepherdRC
        product: ChepherdProtocol
      - package: ChepherdRC
        product: ChepherdTransport
      - package: ChepherdRC
        product: ChepherdAuth
      - package: ChepherdRC
        product: ChepherdStyle

schemes:
  chepherd-rc:
    build:
      targets:
        chepherd-rc: all
    run:
      config: Debug
    archive:
      config: Release
